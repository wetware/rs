name: Setup Cap'n Proto
description: Build and install Cap'n Proto 1.1.0 from source (cached)
inputs:
  cache-key-suffix:
    description: Extra suffix for cache key (defaults to runner.arch)
    default: ''
runs:
  using: composite
  steps:
    - name: Cache Cap'n Proto
      id: capnp-cache
      uses: actions/cache@v5
      with:
        path: /tmp/capnp-install
        key: capnp-1.1.0-${{ runner.os }}-${{ inputs.cache-key-suffix || runner.arch }}

    - name: Build Cap'n Proto
      if: steps.capnp-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        curl -fsSL "https://capnproto.org/capnproto-c++-1.1.0.tar.gz" | tar xz
        cd capnproto-c++-1.1.0
        ./configure --prefix=/tmp/capnp-install
        make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)
        make install
        cd .. && rm -rf capnproto-c++-1.1.0

    - name: Install Cap'n Proto
      shell: bash
      run: sudo cp -R /tmp/capnp-install/. /usr/local/
