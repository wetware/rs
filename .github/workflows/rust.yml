name: Rust CI/CD

on:
  push:
    branches: [ "master", "staging" ]
  pull_request:
    branches: [ "master", "staging" ]

env:
  CARGO_TERM_COLOR: always
  CARGO_HOME: /home/runner/.cargo
  CARGO_INCREMENTAL: 0

jobs:
  fmt:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt

    - name: cargo fmt --all -- --check
      run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy

    - name: Cache Cap'n Proto
      id: capnp-cache
      uses: actions/cache@v4
      with:
        path: /tmp/capnp-install
        key: capnp-1.1.0-linux-x86_64

    - name: Build Cap'n Proto
      if: steps.capnp-cache.outputs.cache-hit != 'true'
      run: |
        curl -fsSL "https://capnproto.org/capnproto-c++-1.1.0.tar.gz" | tar xz
        cd capnproto-c++-1.1.0
        ./configure --prefix=/tmp/capnp-install
        make -j$(nproc)
        make install
        cd .. && rm -rf capnproto-c++-1.1.0

    - name: Install Cap'n Proto
      run: sudo cp -a /tmp/capnp-install/. /usr/local/

    - uses: Swatinem/rust-cache@v2

    - name: cargo clippy (host crates)
      run: cargo clippy -p ww -p membrane -p atom -p glia -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    # Run in parallel with clippy — don't wait for it.
    # fmt is fast (~10s) so we still gate on it.
    needs: [fmt]
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-unknown-linux-gnu, wasm32-wasip2

    - name: Cache Cap'n Proto
      id: capnp-cache
      uses: actions/cache@v4
      with:
        path: /tmp/capnp-install
        key: capnp-1.1.0-linux-x86_64

    - name: Build Cap'n Proto
      if: steps.capnp-cache.outputs.cache-hit != 'true'
      run: |
        curl -fsSL "https://capnproto.org/capnproto-c++-1.1.0.tar.gz" | tar xz
        cd capnproto-c++-1.1.0
        ./configure --prefix=/tmp/capnp-install
        make -j$(nproc)
        make install
        cd .. && rm -rf capnproto-c++-1.1.0

    - name: Install Cap'n Proto
      run: sudo cp -a /tmp/capnp-install/. /usr/local/

    - name: Install Foundry
      uses: foundry-rs/foundry-toolchain@v1

    - name: Install IPFS (Kubo)
      run: |
        KUBO_VERSION="v0.33.0"
        wget -qO- "https://dist.ipfs.tech/kubo/${KUBO_VERSION}/kubo_${KUBO_VERSION}_linux-amd64.tar.gz" | tar xz
        sudo mv kubo/ipfs /usr/local/bin/
        rm -rf kubo

    - name: Start IPFS daemon
      run: |
        ipfs init --profile=test
        if [ -n "$IPFS_PEER_ADDR" ]; then
          ipfs bootstrap rm --all
          ipfs bootstrap add "$IPFS_PEER_ADDR"
        fi
        ipfs daemon --enable-gc &
        for i in $(seq 1 30); do ipfs id >/dev/null 2>&1 && break; sleep 0.5; done
      env:
        IPFS_PEER_ADDR: ${{ secrets.IPFS_PEER_ADDR }}

    - uses: Swatinem/rust-cache@v2

    - name: Build WASI example binaries
      run: make -C examples/echo

    - name: Run tests
      run: cargo test

  solidity:
    name: Solidity (Foundry)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Foundry
      uses: foundry-rs/foundry-toolchain@v1

    - name: Check formatting
      working-directory: contracts/stem
      run: forge fmt --check

    - name: Build contracts
      working-directory: contracts/stem
      run: forge build --sizes

    - name: Run tests
      working-directory: contracts/stem
      run: forge test -vvv

  build-and-deploy:
    name: Build & Deploy to master.wetware.run
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: [test]
    runs-on: ubuntu-latest
    environment: master
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Containerfile
        push: true
        build-args: GIT_COMMIT=${{ github.sha }}
        tags: |
          ghcr.io/wetware/ww:master
          ghcr.io/wetware/ww:master-${{ github.sha }}
        # cache-from: type=gha
        # cache-to: type=gha,mode=max

    - name: Deploy to VPS
      env:
        SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        SSH_HOST_KEY: ${{ secrets.DEPLOY_SSH_HOST_KEY }}
        VPS_HOST: 77.90.2.37
        VPS_USER: lthibault
      run: |
        mkdir -p ~/.ssh
        echo "$SSH_KEY" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        echo "$SSH_HOST_KEY" > ~/.ssh/known_hosts

        for attempt in 1 2; do
          echo "Deploy attempt $attempt..."
          if ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" \
            "kubectl rollout restart deployment/ww-master && \
             kubectl rollout status deployment/ww-master --timeout=120s"; then
            echo "Deploy succeeded on attempt $attempt"
            exit 0
          fi
          if [ "$attempt" -lt 2 ]; then
            echo "Deploy failed, retrying in 30s..."
            sleep 30
          fi
        done
        echo "Deploy failed after 2 attempts"
        exit 1

  # Release builds moved to .github/workflows/release.yml
