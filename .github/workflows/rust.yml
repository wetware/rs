name: Rust CI/CD

on:
  push:
    branches: [ "master", "staging" ]
  pull_request:
    branches: [ "master", "staging" ]

env:
  CARGO_TERM_COLOR: always
  CARGO_HOME: /home/runner/.cargo
  CARGO_INCREMENTAL: 0

jobs:
  fmt:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt

    - name: cargo fmt --all -- --check
      run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy

    - name: Cache Cap'n Proto
      id: capnp-cache
      uses: actions/cache@v4
      with:
        path: /tmp/capnp-install
        key: capnp-1.1.0-linux-x86_64

    - name: Build Cap'n Proto
      if: steps.capnp-cache.outputs.cache-hit != 'true'
      run: |
        curl -fsSL "https://capnproto.org/capnproto-c++-1.1.0.tar.gz" | tar xz
        cd capnproto-c++-1.1.0
        ./configure --prefix=/tmp/capnp-install
        make -j$(nproc)
        make install
        cd .. && rm -rf capnproto-c++-1.1.0

    - name: Install Cap'n Proto
      run: sudo cp -a /tmp/capnp-install/. /usr/local/

    - uses: Swatinem/rust-cache@v2

    - name: cargo clippy (host crates)
      run: cargo clippy -p ww -p membrane -p atom -p glia -- -D warnings

  solidity:
    name: Solidity (Foundry)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Foundry
      uses: foundry-rs/foundry-toolchain@v1

    - name: Check formatting
      working-directory: contracts/stem
      run: forge fmt --check

    - name: Build contracts
      working-directory: contracts/stem
      run: forge build --sizes

    - name: Run tests
      working-directory: contracts/stem
      run: forge test -vvv

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [fmt]
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-unknown-linux-gnu, wasm32-wasip2

    - name: Cache Cap'n Proto
      id: capnp-cache
      uses: actions/cache@v4
      with:
        path: /tmp/capnp-install
        key: capnp-1.1.0-linux-x86_64

    - name: Build Cap'n Proto
      if: steps.capnp-cache.outputs.cache-hit != 'true'
      run: |
        curl -fsSL "https://capnproto.org/capnproto-c++-1.1.0.tar.gz" | tar xz
        cd capnproto-c++-1.1.0
        ./configure --prefix=/tmp/capnp-install
        make -j$(nproc)
        make install
        cd .. && rm -rf capnproto-c++-1.1.0

    - name: Install Cap'n Proto
      run: sudo cp -a /tmp/capnp-install/. /usr/local/

    - name: Install Foundry
      uses: foundry-rs/foundry-toolchain@v1

    - name: Install IPFS (Kubo)
      run: |
        KUBO_VERSION="v0.33.0"
        wget -qO- "https://dist.ipfs.tech/kubo/${KUBO_VERSION}/kubo_${KUBO_VERSION}_linux-amd64.tar.gz" | tar xz
        sudo mv kubo/ipfs /usr/local/bin/
        rm -rf kubo

    - name: Start IPFS daemon
      run: |
        ipfs init --profile=test
        if [ -n "$IPFS_PEER_ADDR" ]; then
          ipfs bootstrap rm --all
          ipfs bootstrap add "$IPFS_PEER_ADDR"
        fi
        ipfs daemon --enable-gc &
        for i in $(seq 1 30); do ipfs id >/dev/null 2>&1 && break; sleep 0.5; done
      env:
        IPFS_PEER_ADDR: ${{ secrets.IPFS_PEER_ADDR }}

    - uses: Swatinem/rust-cache@v2

    - name: Build WASI example binaries
      run: make -C examples/echo

    - name: Run tests
      run: cargo test

  # === Master-only: fan out after test passes ===

  build-wasm:
    name: Build WASM components
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: [test]
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-wasip2

    - name: Cache Cap'n Proto
      id: capnp-cache
      uses: actions/cache@v4
      with:
        path: /tmp/capnp-install
        key: capnp-1.1.0-linux-wasm

    - name: Build Cap'n Proto
      if: steps.capnp-cache.outputs.cache-hit != 'true'
      run: |
        curl -fsSL "https://capnproto.org/capnproto-c++-1.1.0.tar.gz" | tar xz
        cd capnproto-c++-1.1.0
        ./configure --prefix=/tmp/capnp-install
        make -j$(nproc)
        make install
        cd .. && rm -rf capnproto-c++-1.1.0

    - name: Install Cap'n Proto
      run: sudo cp -a /tmp/capnp-install/. /usr/local/

    - uses: Swatinem/rust-cache@v2
      with:
        key: wasm-std

    - name: Build WASM std + examples
      run: make std && make examples

    - uses: actions/upload-artifact@v4
      with:
        name: wasm-artifacts
        path: |
          std/kernel/bin/main.wasm
          std/shell/bin/shell.wasm
          std/mcp/bin/main.wasm
          examples/echo/bin/echo.wasm
        retention-days: 1

  build-binaries:
    name: Build ${{ matrix.artifact }}
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: [test, build-wasm]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ww-linux-x86_64
            bin_path: bin/linux/x86_64
            use_cross: false

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ww-linux-aarch64
            bin_path: bin/linux/aarch64
            use_cross: true

          - target: aarch64-apple-darwin
            os: macos-14
            artifact: ww-macos-aarch64
            bin_path: bin/macos/aarch64
            use_cross: false

          - target: x86_64-apple-darwin
            os: macos-14
            artifact: ww-macos-x86_64
            bin_path: bin/macos/x86_64
            use_cross: false

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - uses: actions/download-artifact@v4
      with:
        name: wasm-artifacts

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Cache Cap'n Proto
      if: ${{ !matrix.use_cross }}
      id: capnp-cache
      uses: actions/cache@v4
      with:
        path: /tmp/capnp-install
        key: capnp-1.1.0-${{ runner.os }}-${{ matrix.target }}

    - name: Build Cap'n Proto
      if: ${{ !matrix.use_cross && steps.capnp-cache.outputs.cache-hit != 'true' }}
      run: |
        curl -fsSL "https://capnproto.org/capnproto-c++-1.1.0.tar.gz" | tar xz
        cd capnproto-c++-1.1.0
        ./configure --prefix=/tmp/capnp-install
        make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)
        make install
        cd .. && rm -rf capnproto-c++-1.1.0

    - name: Install Cap'n Proto
      if: ${{ !matrix.use_cross }}
      run: sudo cp -R /tmp/capnp-install/. /usr/local/

    - name: Install cross
      if: ${{ matrix.use_cross }}
      run: cargo install cross --git https://github.com/cross-rs/cross

    - uses: Swatinem/rust-cache@v2
      with:
        key: master-${{ matrix.target }}

    - name: Build (native)
      if: ${{ !matrix.use_cross }}
      run: cargo build --release --target ${{ matrix.target }}

    - name: Build (cross)
      if: ${{ matrix.use_cross }}
      run: cross build --release --target ${{ matrix.target }}

    - name: Package binary
      run: |
        mkdir -p ${{ matrix.bin_path }}
        cp target/${{ matrix.target }}/release/ww ${{ matrix.bin_path }}/ww

    - uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact }}
        path: ${{ matrix.bin_path }}/ww
        retention-days: 1

  deploy:
    name: Deploy to master.wetware.run
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: [test]
    runs-on: ubuntu-latest
    environment: master
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Containerfile
        push: true
        build-args: GIT_COMMIT=${{ github.sha }}
        tags: |
          ghcr.io/wetware/ww:master
          ghcr.io/wetware/ww:master-${{ github.sha }}

    - name: Deploy to VPS
      env:
        SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        SSH_HOST_KEY: ${{ secrets.DEPLOY_SSH_HOST_KEY }}
        VPS_HOST: 77.90.2.37
        VPS_USER: lthibault
      run: |
        mkdir -p ~/.ssh
        echo "$SSH_KEY" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        echo "$SSH_HOST_KEY" > ~/.ssh/known_hosts

        for attempt in 1 2; do
          echo "Deploy attempt $attempt..."
          if ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" \
            "kubectl rollout restart deployment/ww-master && \
             kubectl rollout status deployment/ww-master --timeout=120s"; then
            echo "Deploy succeeded on attempt $attempt"
            exit 0
          fi
          if [ "$attempt" -lt 2 ]; then
            echo "Deploy failed, retrying in 30s..."
            sleep 30
          fi
        done
        echo "Deploy failed after 2 attempts"
        exit 1

  publish-ipfs:
    name: Publish to IPFS
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: [build-binaries, build-wasm, deploy]
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Publish to IPFS via VPS
      env:
        SSH_CMD: ssh -i ~/.ssh/deploy_key -o ServerAliveInterval=30 -o ServerAliveCountMax=10
      run: |
        # Set up SSH
        mkdir -p ~/.ssh
        echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        echo "${{ secrets.DEPLOY_SSH_HOST_KEY }}" > ~/.ssh/known_hosts

        # Assemble release tree (repo working tree minus .git/target + all platform binaries + WASM)
        STAGE=/tmp/release-tree
        rsync -a --exclude .git --exclude target . "$STAGE/"

        # Place binaries from build matrix
        mkdir -p "$STAGE/bin/linux/x86_64" "$STAGE/bin/linux/aarch64" "$STAGE/bin/macos/aarch64" "$STAGE/bin/macos/x86_64"
        cp artifacts/ww-linux-x86_64/ww   "$STAGE/bin/linux/x86_64/ww"
        cp artifacts/ww-linux-aarch64/ww   "$STAGE/bin/linux/aarch64/ww"
        cp artifacts/ww-macos-aarch64/ww   "$STAGE/bin/macos/aarch64/ww"
        cp artifacts/ww-macos-x86_64/ww    "$STAGE/bin/macos/x86_64/ww"

        # Place WASM artifacts
        cp artifacts/wasm-artifacts/std/kernel/bin/main.wasm  "$STAGE/std/kernel/bin/main.wasm"  2>/dev/null || true
        cp artifacts/wasm-artifacts/std/shell/bin/shell.wasm  "$STAGE/std/shell/bin/shell.wasm"  2>/dev/null || true
        cp artifacts/wasm-artifacts/std/mcp/bin/main.wasm     "$STAGE/std/mcp/bin/main.wasm"     2>/dev/null || true

        # Generate checksums
        cd "$STAGE"
        find bin/ -type f | sort | xargs sha256sum > CHECKSUMS.txt
        cd -

        # Get IPFS pod name
        POD=$($SSH_CMD ${{ secrets.VPS_SSH }} "kubectl get pod -l app=ipfs-daemon -o jsonpath='{.items[0].metadata.name}'")
        echo "IPFS pod: $POD"

        # Rsync release tree to VPS
        rsync -a -e "$SSH_CMD" "$STAGE/" ${{ secrets.VPS_SSH }}:/tmp/ww-release-tree/

        # kubectl cp into pod, ipfs add, pin, publish
        $SSH_CMD ${{ secrets.VPS_SSH }} "
          kubectl cp /tmp/ww-release-tree $POD:/tmp/release-tree
          CID=\$(kubectl exec $POD -- ipfs add -rQ --cid-version=1 /tmp/release-tree/)
          echo \"CID=\$CID\"
          kubectl exec $POD -- ipfs pin add \$CID
          kubectl exec $POD -- ipfs name publish --key=ww-release /ipfs/\$CID
          kubectl exec $POD -- rm -rf /tmp/release-tree
          rm -rf /tmp/ww-release-tree
        " | tee /tmp/ipfs-publish-output.txt

        # Extract CID from output
        CID=$(grep '^CID=' /tmp/ipfs-publish-output.txt | cut -d= -f2)
        echo "Release CID: $CID"
        echo "CID=$CID" >> "$GITHUB_ENV"

    - name: Record CID
      run: |
        echo "## IPFS Publish" >> "$GITHUB_STEP_SUMMARY"
        echo "- CID: \`${{ env.CID }}\`" >> "$GITHUB_STEP_SUMMARY"
        echo "- IPNS: \`/ipns/${{ secrets.IPNS_KEY_ID }}\`" >> "$GITHUB_STEP_SUMMARY"

  # Release builds moved to .github/workflows/release.yml
