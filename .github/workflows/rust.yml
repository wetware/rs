name: Rust CI/CD

on:
  push:
    branches: [ "master", "staging" ]
  pull_request:
    branches: [ "master", "staging" ]

env:
  CARGO_TERM_COLOR: always
  CARGO_HOME: /home/runner/.cargo
  CARGO_INCREMENTAL: 0

jobs:
  fmt:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt

    - name: cargo fmt --all -- --check
      run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy

    - name: Cache Cap'n Proto
      id: capnp-cache
      uses: actions/cache@v4
      with:
        path: /tmp/capnp-install
        key: capnp-1.1.0-linux-x86_64

    - name: Build Cap'n Proto
      if: steps.capnp-cache.outputs.cache-hit != 'true'
      run: |
        curl -fsSL "https://capnproto.org/capnproto-c++-1.1.0.tar.gz" | tar xz
        cd capnproto-c++-1.1.0
        ./configure --prefix=/tmp/capnp-install
        make -j$(nproc)
        make install
        cd .. && rm -rf capnproto-c++-1.1.0

    - name: Install Cap'n Proto
      run: sudo cp -a /tmp/capnp-install/. /usr/local/

    - uses: Swatinem/rust-cache@v2

    - name: cargo clippy (host crates)
      run: cargo clippy -p ww -p membrane -p atom -p glia -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    # Run in parallel with clippy — don't wait for it.
    # fmt is fast (~10s) so we still gate on it.
    needs: [fmt]
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-unknown-linux-gnu, wasm32-wasip2

    - name: Cache Cap'n Proto
      id: capnp-cache
      uses: actions/cache@v4
      with:
        path: /tmp/capnp-install
        key: capnp-1.1.0-linux-x86_64

    - name: Build Cap'n Proto
      if: steps.capnp-cache.outputs.cache-hit != 'true'
      run: |
        curl -fsSL "https://capnproto.org/capnproto-c++-1.1.0.tar.gz" | tar xz
        cd capnproto-c++-1.1.0
        ./configure --prefix=/tmp/capnp-install
        make -j$(nproc)
        make install
        cd .. && rm -rf capnproto-c++-1.1.0

    - name: Install Cap'n Proto
      run: sudo cp -a /tmp/capnp-install/. /usr/local/

    - name: Install Foundry
      uses: foundry-rs/foundry-toolchain@v1

    - name: Install IPFS (Kubo)
      run: |
        KUBO_VERSION="v0.33.0"
        wget -qO- "https://dist.ipfs.tech/kubo/${KUBO_VERSION}/kubo_${KUBO_VERSION}_linux-amd64.tar.gz" | tar xz
        sudo mv kubo/ipfs /usr/local/bin/
        rm -rf kubo

    - name: Start IPFS daemon
      run: |
        ipfs init --profile=test
        if [ -n "$IPFS_PEER_ADDR" ]; then
          ipfs bootstrap rm --all
          ipfs bootstrap add "$IPFS_PEER_ADDR"
        fi
        ipfs daemon --enable-gc &
        for i in $(seq 1 30); do ipfs id >/dev/null 2>&1 && break; sleep 0.5; done
      env:
        IPFS_PEER_ADDR: ${{ secrets.IPFS_PEER_ADDR }}

    - uses: Swatinem/rust-cache@v2

    - name: Build WASI example binaries
      run: make -C examples/echo

    - name: Run tests
      run: cargo test

  solidity:
    name: Solidity (Foundry)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Foundry
      uses: foundry-rs/foundry-toolchain@v1

    - name: Check formatting
      working-directory: contracts/stem
      run: forge fmt --check

    - name: Build contracts
      working-directory: contracts/stem
      run: forge build --sizes

    - name: Run tests
      working-directory: contracts/stem
      run: forge test -vvv

  build-and-publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'release'
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-unknown-linux-gnu

    - name: Cache Cap'n Proto
      id: capnp-cache
      uses: actions/cache@v4
      with:
        path: /tmp/capnp-install
        key: capnp-1.1.0-linux-x86_64

    - name: Build Cap'n Proto
      if: steps.capnp-cache.outputs.cache-hit != 'true'
      run: |
        curl -fsSL "https://capnproto.org/capnproto-c++-1.1.0.tar.gz" | tar xz
        cd capnproto-c++-1.1.0
        ./configure --prefix=/tmp/capnp-install
        make -j$(nproc)
        make install
        cd .. && rm -rf capnproto-c++-1.1.0

    - name: Install Cap'n Proto
      run: sudo cp -a /tmp/capnp-install/. /usr/local/

    - name: Add wasm32-wasip2 target
      run: rustup target add wasm32-wasip2

    - uses: Swatinem/rust-cache@v2

    - name: Build WASM images (std + examples)
      run: make std

    - name: Build release (embeds WASM via include_bytes)
      run: cargo build --release

    - name: Create release artifacts
      run: |
        mkdir -p dist
        cp target/release/ww dist/ww-linux-x86_64
        tar -czf dist/ww-linux-x86_64.tar.gz -C target/release ww
        shasum -a 256 dist/ww-linux-x86_64 > dist/checksums.txt

    - name: Upload release artifacts
      uses: actions/upload-artifact@v4
      with:
        name: release-artifacts
        path: dist/

    - name: Upload binaries to GitHub Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/ww-linux-x86_64
          dist/ww-linux-x86_64.tar.gz
          dist/checksums.txt

    - name: Build Podman image
      run: |
        podman build \
          --build-arg GIT_COMMIT=$(echo ${{ github.sha }} | cut -c1-7) \
          -t ghcr.io/wetware/ww:${{ github.event.release.tag_name }} .
        podman tag ghcr.io/wetware/ww:${{ github.event.release.tag_name }} ghcr.io/wetware/ww:latest

    - name: Smoke test container
      run: podman run --rm ghcr.io/wetware/ww:${{ github.event.release.tag_name }} --help

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Push container image to ghcr.io
      run: |
        podman push ghcr.io/wetware/ww:${{ github.event.release.tag_name }}
        podman push ghcr.io/wetware/ww:latest

  # container-build: disabled — no Dockerfile yet.
  # Re-enable when container packaging is ready.
