name: Changelog

on:
  pull_request:
    branches: [master]

jobs:
  changelog:
    name: Require changelog entry
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Check CHANGELOG.md was modified
      run: |
        if git diff --name-only origin/master...HEAD | grep -q '^CHANGELOG.md$'; then
          echo "CHANGELOG.md was updated."
        else
          echo "::error::CHANGELOG.md was not modified. Please add a changelog entry for this PR."
          exit 1
        fi
