name: Release

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build-binaries:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ww-linux-x86_64
            use_cross: false

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ww-linux-aarch64
            use_cross: true

          - target: aarch64-apple-darwin
            os: macos-14
            artifact: ww-macos-aarch64
            use_cross: false

          - target: x86_64-apple-darwin
            os: macos-14
            artifact: ww-macos-x86_64
            use_cross: false

    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Cache Cap'n Proto
      if: ${{ !matrix.use_cross }}
      id: capnp-cache
      uses: actions/cache@v5
      with:
        path: /tmp/capnp-install
        key: capnp-1.1.0-${{ runner.os }}-${{ matrix.target }}

    - name: Build Cap'n Proto
      if: ${{ !matrix.use_cross && steps.capnp-cache.outputs.cache-hit != 'true' }}
      run: |
        curl -fsSL "https://capnproto.org/capnproto-c++-1.1.0.tar.gz" | tar xz
        cd capnproto-c++-1.1.0
        ./configure --prefix=/tmp/capnp-install
        make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)
        make install
        cd .. && rm -rf capnproto-c++-1.1.0

    - name: Install Cap'n Proto
      if: ${{ !matrix.use_cross }}
      run: |
        if [ "$RUNNER_OS" = "Linux" ]; then
          sudo cp -a /tmp/capnp-install/. /usr/local/
        else
          cp -a /tmp/capnp-install/. /usr/local/
        fi

    - name: Install cross
      if: ${{ matrix.use_cross }}
      run: cargo install cross --git https://github.com/cross-rs/cross

    - uses: Swatinem/rust-cache@v2
      with:
        key: release-${{ matrix.target }}

    - name: Build (native)
      if: ${{ !matrix.use_cross }}
      run: cargo build --release --target ${{ matrix.target }}

    - name: Build (cross)
      if: ${{ matrix.use_cross }}
      run: cross build --release --target ${{ matrix.target }}

    - name: Package binary
      run: |
        mkdir -p dist
        tar -czf dist/${{ matrix.artifact }}.tar.gz \
          -C target/${{ matrix.target }}/release ww

    - uses: actions/upload-artifact@v5
      with:
        name: ${{ matrix.artifact }}
        path: dist/${{ matrix.artifact }}.tar.gz
        retention-days: 1

  checksums-and-upload:
    name: Checksums & Upload
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
    - uses: actions/download-artifact@v5
      with:
        path: artifacts
        merge-multiple: true

    - name: Install b3sum
      run: |
        curl -fsSL https://github.com/BLAKE3-team/BLAKE3/releases/latest/download/b3sum_linux_x64_bin -o /usr/local/bin/b3sum
        chmod +x /usr/local/bin/b3sum

    - name: Generate CHECKSUMS.txt
      run: |
        cd artifacts

        # Multihash blake3 (multicodec 0x1e, length 0x20 = 32 bytes)
        echo "# Multihash checksums (self-describing algorithm prefix)"
        echo "# BLAKE3 (multicodec 0x1e, 32 bytes)" > CHECKSUMS.txt
        for f in ww-*.tar.gz; do
          hash=$(b3sum --no-names "$f")
          echo "1e20${hash}  $f" >> CHECKSUMS.txt
        done

        echo "# SHA2-256 (multicodec 0x12, 32 bytes)" >> CHECKSUMS.txt
        for f in ww-*.tar.gz; do
          hash=$(sha256sum "$f" | cut -d' ' -f1)
          echo "1220${hash}  $f" >> CHECKSUMS.txt
        done

        echo "" >> CHECKSUMS.txt
        echo "# Raw SHA-256 (compatible with: sha256sum --check CHECKSUMS.txt)" >> CHECKSUMS.txt
        sha256sum ww-*.tar.gz >> CHECKSUMS.txt

    - name: Upload release assets
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        cd artifacts
        gh release upload "${{ github.event.release.tag_name }}" \
          --clobber \
          ww-*.tar.gz CHECKSUMS.txt

  build-container:
    name: Build & Push Container
    needs: build-binaries
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive

    - uses: actions/download-artifact@v5
      with:
        path: artifacts
        merge-multiple: true

    - name: Prepare binaries for multi-arch build
      run: |
        mkdir -p docker-context
        cp Containerfile.release docker-context/Containerfile

        # Extract binaries and rename for TARGETARCH convention
        cd artifacts
        tar xzf ww-linux-x86_64.tar.gz
        mv ww ../docker-context/ww-amd64
        tar xzf ww-linux-aarch64.tar.gz
        mv ww ../docker-context/ww-arm64

    - uses: docker/setup-qemu-action@v3
    - uses: docker/setup-buildx-action@v3

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push
      id: push
      uses: docker/build-push-action@v6
      with:
        context: docker-context
        file: docker-context/Containerfile
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          ghcr.io/wetware/ww:${{ github.event.release.tag_name }}
          ghcr.io/wetware/ww:latest

    - name: Build single-arch image for IPFS artifact
      uses: docker/build-push-action@v6
      with:
        context: docker-context
        file: docker-context/Containerfile
        platforms: linux/amd64
        load: true
        tags: ww-ipfs-export:latest

    - name: Save container image tar
      run: docker save ww-ipfs-export:latest -o ww-image.tar

    - uses: actions/upload-artifact@v5
      with:
        name: ww-image
        path: ww-image.tar
        retention-days: 1

    - name: Smoke test
      run: |
        docker run --rm \
          ghcr.io/wetware/ww@${{ steps.push.outputs.digest }} \
          --help

  sign-container:
    name: Sign Container
    needs: build-container
    runs-on: ubuntu-latest
    steps:
    - uses: sigstore/cosign-installer@v3

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Sign image
      run: |
        cosign sign --yes \
          ghcr.io/wetware/ww@${{ needs.build-container.outputs.digest }}

  publish-ipfs:
    name: Publish to IPFS
    needs: [build-binaries, build-container]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive

    - name: Install IPFS
      run: |
        wget -qO- https://dist.ipfs.tech/kubo/v0.32.1/kubo_v0.32.1_linux-amd64.tar.gz | tar xz
        sudo mv kubo/ipfs /usr/local/bin/
        ipfs init --profile server
        ipfs daemon &
        for i in $(seq 1 30); do ipfs id >/dev/null 2>&1 && break || sleep 1; done

    - uses: actions/download-artifact@v5
      with:
        path: artifacts
        merge-multiple: true

    - name: Install b3sum
      run: |
        curl -fsSL https://github.com/BLAKE3-team/BLAKE3/releases/latest/download/b3sum_linux_x64_bin -o /usr/local/bin/b3sum
        chmod +x /usr/local/bin/b3sum

    - name: Assemble release tree
      run: |
        STAGE=/tmp/release-tree
        rsync -a --exclude .git --exclude target . "$STAGE/"
        cd "$STAGE"

        mkdir -p bin/linux/x86_64 bin/linux/aarch64 bin/macos/x86_64 bin/macos/aarch64
        tar xzf "$GITHUB_WORKSPACE/artifacts/ww-linux-x86_64.tar.gz" -C bin/linux/x86_64/
        tar xzf "$GITHUB_WORKSPACE/artifacts/ww-linux-aarch64.tar.gz" -C bin/linux/aarch64/
        tar xzf "$GITHUB_WORKSPACE/artifacts/ww-macos-x86_64.tar.gz" -C bin/macos/x86_64/
        tar xzf "$GITHUB_WORKSPACE/artifacts/ww-macos-aarch64.tar.gz" -C bin/macos/aarch64/

        mkdir -p oci
        cp "$GITHUB_WORKSPACE/artifacts/ww-image.tar" oci/image.tar

        echo "# blake3" > CHECKSUMS.txt
        find bin/ oci/ -type f | sort | xargs b3sum >> CHECKSUMS.txt
        echo "" >> CHECKSUMS.txt
        echo "# sha256" >> CHECKSUMS.txt
        find bin/ oci/ -type f | sort | xargs sha256sum >> CHECKSUMS.txt

    - name: Publish to IPFS
      run: |
        CID=$(ipfs add -rQ /tmp/release-tree/)
        echo "Release CID: $CID"
        echo "CID=$CID" >> "$GITHUB_ENV"

    - name: Set up SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        echo "${{ secrets.DEPLOY_SSH_HOST_KEY }}" > ~/.ssh/known_hosts

    - name: Connect CI node to K8s Kubo pod
      run: ipfs swarm connect ${{ secrets.KUBO_MULTIADDR }}

    - name: Pin + IPNS publish via SSH proxy
      run: |
        ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_SSH }} "kubectl exec ipfs-daemon-0 -- \
          timeout 600 ipfs pin add ${{ env.CID }}"
        echo "Pin confirmed on persistent node"
        ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_SSH }} "kubectl exec ipfs-daemon-0 -- \
          ipfs name publish --key=ww-release /ipfs/${{ env.CID }}"
        echo "IPNS updated on persistent node"

    - name: Record release CID
      run: |
        echo "## IPFS Release" >> "$GITHUB_STEP_SUMMARY"
        echo "- CID: \`${{ env.CID }}\`" >> "$GITHUB_STEP_SUMMARY"
        echo "- IPNS: \`/ipns/${{ secrets.IPNS_KEY_ID }}\`" >> "$GITHUB_STEP_SUMMARY"
